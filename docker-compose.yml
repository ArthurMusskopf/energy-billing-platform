services:
  backend:
    build:
      context: ./backend
    container_name: energy-billing-platform-backend
    env_file:
      - ./.env
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: energy-billing-platform-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: energy-billing-platform-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
